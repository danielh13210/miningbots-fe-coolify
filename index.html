<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mining Bots</title>
  <script src="scripts/ui/toggle_navigation.js" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.3.4/purify.min.js"
    integrity="sha384-KGmzmwrs7oAU2sG5qfETslFsscVcCaxQrX2d7PW7I9bTrsuTD/eSMFr9jaMS9i+b"
    crossorigin="anonymous"></script>
  <link href="/styles/tailwind.css" rel="stylesheet" />
  <script src="/scripts/ui/server_text.js"></script>
  <script src="/scripts/ui/main_page.js" type="module"></script>
</head>

<body>
  <!--Allows the game canvas and a collection of players' bots to be aligned side-by-side horizontally-->
  <div class="app-shell" id="game-info-container">
    <!--The drawing of the game-->
    <main class="map-pane" aria-label="game map">
      <div class="map-viewport" id="map-viewport">
        <div class="map-canvas-stage" id="map-canvas-stage">
          <canvas id="gameCanvas" aria-label="game map view"></canvas>
        </div>
      </div>
    </main>

    <!--A DIV to hold all the player-bot info-->
    <div class="sidebar-container" id="bot-info-megacontainer">
      <div class="sidebar-chrome">
        <div id="nav-peek-triggerbox" aria-hidden="true"></div>
        <nav class="app-nav competition-disabled">
          <img alt="tinkertanker logo" src="favicon.ico" class="app-brand-logo" width="30" height="30">
          <a class="app-brand" href="#">Mining Bots</a>
          <button class="app-nav-toggle" type="button" id="app-nav-toggle" aria-controls="serverNavPanel"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="app-nav-toggle-icon"></span>
          </button>
          <div class="app-nav-panel" id="serverNavPanel">
            <ul class="app-nav-list">
              <li class="server-menu-wrap">
                <a class="server-menu-trigger" href="#" id="serverMenuButton" role="button"
                  aria-haspopup="true" aria-expanded="false">
                  Select a server
                </a>
                <div class="server-menu hidden" aria-labelledby="serverMenuButton">
                  <!-- Server options are dynamically populated. -->
                </div>
              </li>
            </ul>
          </div>
          <div class="app-nav-actions">
            <button class="icon-button" type="button" title="Enter Competition Mode" id="fullscreen-button" helpon-available>
              <span id="fullscreen-icon" class="fa-icon fa-expand" aria-hidden="true"></span>
            </button>
            <button class="icon-button" type="button" title="Settings" id="settings-button" helpon-available>
              <span class="fa-icon fa-gear" aria-hidden="true"></span>
            </button>
          </div>
        </nav>

        <section id="game-status-panel" class="game-status-panel competition-disabled" aria-live="polite">
          <div class="game-status-row game-status-row-primary">
            <div class="game-status-item">
              <span class="game-status-label">Server</span>
              <span class="game-status-value" id="status-server">-</span>
            </div>
            <div class="game-status-item">
              <span class="game-status-label">Game</span>
              <span class="game-status-value" id="status-game">-</span>
            </div>
            <div class="game-status-item game-status-zoom">
              <span class="game-status-label">Zoom</span>
              <div class="map-controls" aria-label="Map controls">
                <button class="map-control-button" type="button" id="zoom-out-button" title="Zoom out">-</button>
                <span class="map-zoom-label" id="map-zoom-label">100%</span>
                <button class="map-control-button" type="button" id="zoom-in-button" title="Zoom in">+</button>
                <button class="map-control-button" type="button" id="zoom-reset-button" title="Reset zoom">1:1</button>
              </div>
            </div>
          </div>
          <div class="game-status-row game-status-row-secondary">
            <div class="game-status-item">
              <span class="game-status-label">Status</span>
              <span class="game-status-value status-pill" id="status-state">-</span>
            </div>
            <div class="game-status-item">
              <span class="game-status-label">Map</span>
              <span class="game-status-value" id="status-map">-</span>
            </div>
            <div class="game-status-item">
              <span class="game-status-label">Players</span>
              <span class="game-status-value" id="status-players">-</span>
            </div>
          </div>
        </section>
      </div>
      <div class="player-sidebar-list" id="player-sidebar-list">
      </div>
    </div>
    <noscript id="page-cover">
      <p id="page-cover-content">
        JavaScript must be enabled to open this page.<br>
        Once enabled, refresh the page.
      </p>
    </noscript>
  </div>

  <script src="game.js" type="module"></script>
  <div id="accessibility-labels">
    <span id="fullscreen-button-label">Toggle Competition Mode</span>
    <span id="fullscreen-button-description"></span>
    <span id="settings-button-label">Settings</span>
    <span id="settings-button-description"></span>
  </div>
</body>

</html>
