<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mining Bots</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <script src="scripts/ui/toggle_navigation.js" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.3.4/purify.min.js"
    integrity="sha384-KGmzmwrs7oAU2sG5qfETslFsscVcCaxQrX2d7PW7I9bTrsuTD/eSMFr9jaMS9i+b"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <link href="styles.css" rel="stylesheet" />
  <script src="/scripts/utilities/svgimporter.js" type="module"></script>
  <script src="/scripts/ui/server_text.js"></script>
  <script src="/scripts/ui/hide_navbar.js" type="module"></script>
</head>

<body>
  <div id="navbar-peek-triggerbox"></div>
  <nav class="navbar navbar-expand-lg navbar-light bg-light competition-disabled">
    <img src="favicon.ico" class="navbar-brand-logo">
    <a class="navbar-brand" href="#">Mining Bots</a>
    <a class="collapse-if-minified navbar-collapse nav-link" id="navbarDropdownMenuLink"></a>
    <a role="button" title="Enter Competition Mode" onclick="CompetitionManager.toggleFullscreen()" id="fullscreen-button" helpon-available><svgfile id="fullscreen-icon" aria-hidden="true" src="/assets/ui/fullscreen.svg"></svgfile></a>
    <script type="module">
      import SVGImporter from "./scripts/utilities/svgimporter.js";
      document.addEventListener('fullscreenchange', (event) => {
        let title,icon;
        if(document.fullscreenElement){
          title="Exit Competition Mode";
          icon="exit_fullscreen";
        } else {
          title="Enter Competition Mode";
          icon="fullscreen";
        }
        document.getElementById("fullscreen-button").title=title;
        let svgicon=document.createElement("svgfile");
        svgicon.ariaHidden=true;
        svgicon.id="fullscreen-icon";
        svgicon.setAttribute("src",`/assets/ui/${icon}.svg`);
        document.getElementById("fullscreen-icon").replaceWith(svgicon);
        SVGImporter.reimport();
      });
    </script>
  </nav>

  <!--Allows the game canvas and a collection of players' bots to be aligned side-by-side horizontally-->
  <div style="display: grid; grid-template-columns: auto auto" id="game-info-container">
    <!--The drawing of the game-->
    <canvas id="gameCanvas"></canvas>

    <!--A DIV to hold all the player-bot info-->
    <div class="sidebar-container" id="bot-info-megacontainer">
      <!--For the purpose of allowing >2 players to be shown, probably best to also dynamically populate this-->
      <!-- <div class="sidebar" id="bot-sidebar-one"></div>
      <div class="sidebar" id="bot-sidebar-two"></div> -->
    </div>
    <noscript id="page-cover">
      <p id="page-cover-content">
        JavaScript must be enabled to open this page.<br>
        Once enabled, refresh the page.
      <p>
    </noscript>
  </div>

  <script src="game.js" type="module"></script>
  <div id="accessibility-labels">
    <span id="fullscreen-button-label">Toggle Competition Mode</span>
    <span id="fullscreen-button-description"></span>
  </div>
</body>

</html>
